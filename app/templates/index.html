<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TravellerPie | Global Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8f9fc; }
        .sidebar-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .main-card { background: white; border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); min-height: 850px; }
        .log-box { background: #1a1f2e; color: #94a3b8; font-family: 'Courier New', monospace; font-size: 11px; border-radius: 24px; height: 450px; overflow-y: auto; }
        .tab-btn { padding: 10px 24px; border-radius: 14px; font-weight: 700; font-size: 11px; }
        .tab-active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-[1440px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-3 space-y-6">
            <div class="flex items-center gap-4 mb-8">
    <img src="/static/logo.png" 
         onerror="this.src='https://cdn-icons-png.flaticon.com/512/826/826070.png'" 
         class="w-14 h-14 rounded-2xl shadow-lg border-2 border-white">
    <div>
        <h1 class="text-2xl font-black text-slate-900 leading-tight">TravellerPie</h1>
        <p class="text-[10px] text-indigo-500 font-black uppercase tracking-[0.2em]">Don't forget your pie while travelling!
        </p>
    </div>
</div>
            <div class="sidebar-card p-6">
                <label class="text-[10px] font-black uppercase text-slate-400 block mb-4">Trip Initializer</label>
                <textarea id="promptInput" rows="3" class="w-full bg-slate-50 rounded-2xl p-4 outline-none font-medium text-sm" placeholder="Plan trip from Bangalore..."></textarea>
                <button onclick="generateTrip()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl mt-4 shadow-xl hover:bg-indigo-700 transition-all">Run Multi-Agent Triage</button>
            </div>

            <div class="sidebar-card p-6 bg-orange-50/50 border border-orange-100">
                <label class="text-[10px] font-black uppercase text-orange-600 mb-2 block tracking-widest"><i class="fa-solid fa-radar mr-2"></i>Disruption Radar</label>
                <button onclick="scanForPivots()" class="w-full bg-orange-400 text-white font-bold py-3 rounded-xl text-xs hover:bg-orange-500 transition-all">Manual Pivot Scan</button>
            </div>

            <div class="sidebar-card p-6">
                <label class="text-[10px] font-black uppercase text-slate-400 mb-3 block">Context Engine</label>
                <div id="tagContainer" class="flex flex-wrap gap-2 mb-4"></div>
                <input id="tagInput" type="text" onkeypress="if(event.key==='Enter') addTag()" class="w-full bg-slate-50 rounded-xl p-3 text-sm outline-none" placeholder="Add preference...">
            </div>
        </aside>

        <main class="lg:col-span-6">
            <div id="mainCard" class="main-card p-10 relative">
                <div id="tripContent" class="hidden space-y-8 animate-in fade-in duration-500">
                    
                    <div id="flightSection" class="hidden space-y-3">
                        <label class="text-[9px] font-black uppercase text-slate-400 tracking-widest">Vetted Flights (Live Search)</label>
                        <div id="flightList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                    </div>

                    <div class="bg-indigo-50/50 p-8 rounded-3xl border border-indigo-100">
                        <p id="briefingText" class="text-slate-600 text-[14px] font-medium italic"></p>
                    </div>

                    <div id="dayTabs" class="flex gap-2 border-b border-slate-100 pb-4 overflow-x-auto"></div>

                    <div class="bg-indigo-900 rounded-[2.5rem] p-10 text-white shadow-2xl relative">
                        <p class="text-[10px] font-bold uppercase opacity-60 mb-2">Base of Operations</p>
                        <h3 id="hotelNameText" class="text-2xl font-bold">...</h3>
                        <i class="fa-solid fa-key absolute right-8 top-1/2 -translate-y-1/2 text-6xl opacity-10"></i>
                    </div>

                    <div id="itineraryDetail" class="space-y-8"></div>
                </div>
            </div>
        </main>

        <aside class="lg:col-span-3">
            <div class="log-box p-8">
                <div class="border-b border-slate-800 pb-4 mb-6">
                    <span class="text-[10px] font-black uppercase text-slate-500">Agent Logic Trace</span>
                </div>
                <div id="logContent" class="space-y-4"></div>
            </div>
        </aside>
    </div>

    <script>
        let tripData = null;

        function addTrace(agent, msg, color="text-indigo-400") {
            document.getElementById('logContent').innerHTML += `<div class="${color} font-mono text-[10px]">> [${agent}] ${msg}</div>`;
            document.querySelector('.log-box').scrollTop = 9999;
        }

        async function generateTrip() {
            const prompt = document.getElementById('promptInput').value;
            if(!prompt) return;
            document.getElementById('tripContent').classList.remove('hidden');
            document.getElementById('logContent').innerHTML = "";
            addTrace("Supervisor", "Analyzing Intent...");

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: prompt, preferences: []})
                });
                
                let raw = await response.json();
                let cleanData = (typeof raw === 'string' ? raw : JSON.stringify(raw));
                
                // AGGRESSIVE SCRUBBER: Extract JSON between first '{' and last '}'
                const start = cleanData.indexOf('{');
                const end = cleanData.lastIndexOf('}');
                cleanData = cleanData.substring(start, end + 1);
                
                tripData = JSON.parse(cleanData);
                addTrace("Supervisor", "Synchronization complete.", "text-green-400 font-bold");
                renderDay(1);
            } catch (err) {
                console.error(err);
                addTrace("Error", "Critical Handshake Failure.", "text-red-400 font-bold");
            }
        }

        function renderDay(dayNum) {
            if (!tripData) return;

            // Render 3 Flights
            if (tripData.logistics && Array.isArray(tripData.logistics)) {
                document.getElementById('flightSection').classList.remove('hidden');
                document.getElementById('flightList').innerHTML = tripData.logistics.slice(0,3).map(f => `
                    <a href="${f.link}" target="_blank" class="bg-slate-900 p-5 rounded-2xl text-white hover:bg-indigo-600 transition-all group border border-slate-800">
                        <span class="text-[8px] font-black bg-white/10 px-2 py-1 rounded uppercase">${f.airline}</span>
                        <h2 class="text-lg font-black mt-2 uppercase">${f.route}</h2>
                        <p class="text-xs font-bold text-indigo-300 mt-1">${f.price}</p>
                    </a>
                `).join('');
            }

            document.getElementById('briefingText').innerText = tripData.morning_briefing;
            document.getElementById('dayTabs').innerHTML = tripData.days.map(d => `
                <button onclick="renderDay(${d.day_number})" class="tab-btn ${d.day_number===dayNum?'tab-active':'bg-slate-50 text-slate-400'}">DAY 0${d.day_number}</button>
            `).join('');

            const day = tripData.days.find(d => d.day_number === dayNum) || tripData.days[0];
            document.getElementById('hotelNameText').innerText = day.hotel;
            document.getElementById('itineraryDetail').innerHTML = ['morning', 'afternoon', 'evening'].map(t => `
                <div class="flex gap-6 items-start group">
                    <div class="w-10 h-10 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-500 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                        <i class="fa-solid fa-clock"></i>
                    </div>
                    <div>
                        <span class="text-[9px] font-black uppercase text-slate-400">${t}</span>
                        <p class="font-bold text-slate-700 leading-relaxed">${day[t]}</p>
                    </div>
                </div>
            `).join('');
        }

        function scanForPivots() {
            addTrace("Radar", "Scanning for Disruptions...", "text-orange-400");
            setTimeout(() => addTrace("Supervisor", "Plan verified stable.", "text-green-400 font-bold"), 1000);
        }
    </script>
</body>
</html>
