<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TravellerPie | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fc; color: #1e293b; }
        .sidebar-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .sidebar-title { font-size: 12px; font-weight: 900; text-transform: uppercase; color: #64748b; margin-bottom: 1rem; display: block; }
        .main-card { background: white; border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); min-height: 850px; }
        .tab-btn { padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .tab-active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .tab-inactive { background: #f1f5f9; color: #64748b; }
        .log-box { background: #1a1f2e; color: #94a3b8; font-family: monospace; font-size: 11px; border-radius: 24px; overflow-y: auto; }
        .tag-pill { background: #eef2ff; color: #4f46e5; padding: 6px 14px; border-radius: 999px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-[1440px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-3 space-y-6">
            <div class="flex items-center gap-4 mb-8">
                <img src="/static/logo.png" class="w-14 h-14 rounded-xl shadow-md">
                <h1 class="text-2xl font-black">TravellerPie</h1>
            </div>

            <div class="sidebar-card p-6">
                <label class="sidebar-title">Trip Initializer</label>
                <textarea id="promptInput" rows="2" class="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 text-md mb-4 outline-none" placeholder="Plan Japan trip for 7 days"></textarea>
                <button onclick="generateTrip()" id="planBtn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-indigo-700">Run Multi-Agent Triage</button>
            </div>

            <div class="sidebar-card p-6 bg-orange-50/50 border border-orange-100">
                <label class="sidebar-title text-orange-600">Disruption Radar</label>
                <button onclick="scanForPivots()" class="w-full bg-orange-400 text-white font-bold py-3 rounded-xl shadow-md text-xs">Manual Pivot Scan</button>
            </div>

            <div class="sidebar-card p-6">
                <label class="sidebar-title">Context Engine</label>
                <div id="tagContainer" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="flex gap-2">
                    <input id="tagInput" type="text" onkeypress="if(event.key==='Enter') addContextTag()" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-sm outline-none" placeholder="Add style preference...">
                    <button onclick="addContextTag()" class="bg-slate-900 text-white w-12 h-12 rounded-xl flex items-center justify-center hover:bg-black transition-all"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-6">
            <div id="mainDisplay" class="main-card p-10 relative">
                <div id="emptyOverlay" class="absolute inset-0 flex items-center justify-center bg-white/95 z-20">
                    <p class="text-slate-300 font-black uppercase tracking-[0.4em] text-[11px]">Command Center Offline</p>
                </div>
                <div id="tripContent" class="hidden space-y-8 animate-in fade-in duration-500">
                    <div class="bg-indigo-50/50 p-8 rounded-3xl border border-indigo-100"><p id="briefingText" class="text-slate-600 text-[15px] font-medium italic"></p></div>
                    
                    <div id="flightCard" class="hidden border-l-8 border-indigo-600 p-6 bg-slate-50 rounded-3xl flex justify-between">
                        <div><h4 id="flightPath" class="text-sm font-bold"></h4><p id="flightTime" class="text-[10px]"></p></div>
                        <span id="airlineTag" class="bg-slate-900 text-white text-[10px] px-3 py-1 rounded h-fit"></span>
                    </div>

                    <div id="dayTabs" class="flex gap-2 border-b border-slate-100 pb-4 overflow-x-auto no-scrollbar"></div>
                    
                    <div class="bg-indigo-900 rounded-[2.5rem] p-10 text-white relative">
                        <h3 id="hotelNameText" class="text-2xl font-bold">...</h3>
                        <i class="fa-solid fa-hotel absolute right-8 top-1/2 -translate-y-1/2 text-5xl opacity-10"></i>
                    </div>

                    <div id="itineraryDetail" class="space-y-10"></div>
                </div>
            </div>
        </main>

        <aside class="lg:col-span-3">
            <div class="log-box p-8 h-full flex flex-col shadow-inner">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-8 border-b border-slate-800 pb-4">Agent Logic Trace</h3>
                <div id="logContent" class="space-y-4 flex-1"></div>
            </div>
        </aside>
    </div>

    <script>
        let tripData = null;

        function addContextTag() {
            const val = document.getElementById('tagInput').value;
            if(!val) return;
            const container = document.getElementById('tagContainer');
            const div = document.createElement('div');
            div.className = "tag-pill";
            div.innerHTML = `${val} <i class="fa-solid fa-xmark cursor-pointer" onclick="this.parentElement.remove()"></i>`;
            container.appendChild(div);
            document.getElementById('tagInput').value = "";
        }

        function addTrace(agent, msg, color = "text-indigo-400") {
            const log = document.getElementById('logContent');
            log.innerHTML += `<div class="${color} font-mono text-[10px] animate-in slide-in-from-left-2">> [${agent}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        async function generateTrip() {
            const promptValue = document.getElementById('promptInput').value;
            const tags = Array.from(document.querySelectorAll('.tag-pill')).map(t => t.innerText.trim());
            if(!promptValue) return;

            document.getElementById('emptyOverlay').style.display = 'none';
            document.getElementById('tripContent').classList.remove('hidden');
            addTrace("Supervisor", "Interpreting intent...");

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptValue, preferences: tags })
                });

                const rawResponse = await response.json();
                console.log("🛠️ RAW DATA:", rawResponse);
                
                let cleanData = typeof rawResponse === 'string' ? rawResponse : JSON.stringify(rawResponse);
                cleanData = cleanData.replace(/```json|```/g, "");
                
                tripData = JSON.parse(cleanData);
                console.log("✅ PARSED:", tripData);

                addTrace("Supervisor", "Sync complete.", "text-green-400 font-bold");
                renderDay(1);
            } catch (err) {
                console.error("❌ ERROR:", err);
                addTrace("Error", "Handshake failed.", "text-red-400");
            }
        }

        function renderDay(dayNum) {
            if (!tripData?.days) return;
            document.getElementById('briefingText').innerText = tripData.morning_briefing;
            document.getElementById('dayTabs').innerHTML = tripData.days.map(d => `<button onclick="renderDay(${d.day_number})" class="tab-btn ${d.day_number === dayNum ? 'tab-active' : 'tab-inactive'}">DAY 0${d.day_number}</button>`).join('');
            
            const currentDay = tripData.days.find(d => d.day_number === dayNum) || tripData.days[0];
            document.getElementById('hotelNameText').innerText = currentDay.hotel;
            
            document.getElementById('itineraryDetail').innerHTML = ['morning', 'afternoon', 'evening'].map(time => `
                <div class="flex gap-8">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-500"><i class="fa-solid fa-clock"></i></div>
                    <div><span class="text-[10px] font-black text-slate-400 uppercase">${time}</span><p class="text-[15px] font-bold mt-2">${currentDay[time]}</p></div>
                </div>
            `).join('');

            if(tripData.logistics) {
                document.getElementById('flightCard').classList.remove('hidden');
                document.getElementById('flightPath').innerText = tripData.logistics.flight_path;
                document.getElementById('airlineTag').innerText = tripData.logistics.airline;
            }
        }

        function scanForPivots() {
            addTrace("Radar", "Scanning local disruptors...", "text-orange-400");
            setTimeout(() => addTrace("Supervisor", "No disruptions found.", "text-green-400 font-bold"), 1000);
        }
    </script>
</body>
</html>
