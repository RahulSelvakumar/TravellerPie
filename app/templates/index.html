<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TravellerPie | Global Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8f9fc; }
        .sidebar-card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .main-card { background: white; border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); min-height: 850px; }
        .log-box { background: #1a1f2e; color: #94a3b8; font-family: 'Courier New', monospace; font-size: 11px; border-radius: 24px; height: 450px; overflow-y: auto; }
        .tab-btn { padding: 10px 24px; border-radius: 14px; font-weight: 700; font-size: 11px; }
        .tab-active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #archiveList::-webkit-scrollbar { width: 4px; }
        #archiveList::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="p-8">

    <div id="authOverlay">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <img src="/static/logo.png" class="w-16 h-16 mx-auto mb-4 rounded-2xl shadow-lg">
                <h2 id="authTitle" class="text-3xl font-black text-slate-900">Access Portal</h2>
                <p id="authSub" class="text-slate-500 text-sm font-medium mt-2">Login to continue</p>
            </div>
            <div class="space-y-4">
                <input id="authEmail" type="email" class="w-full bg-slate-50 rounded-2xl p-4 outline-none border font-medium" placeholder="Email Address">
                <input id="authPassword" type="password" class="w-full bg-slate-50 rounded-2xl p-4 outline-none border font-medium" placeholder="••••••••">
                <button id="mainAuthBtn" onclick="submitAuth()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest">Login</button>
                <div class="text-center mt-6">
                    <button onclick="toggleAuthMode()" id="toggleBtn" class="text-xs font-bold text-indigo-500 hover:text-indigo-700">NEW? REGISTER IDENTITY</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-[1440px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <aside class="lg:col-span-3 space-y-6">
            <div class="flex items-center gap-4 mb-8">
                <img src="/static/logo.png" class="w-14 h-14 rounded-2xl shadow-lg border-2 border-white">
                <div>
                    <h1 class="text-2xl font-black text-slate-900 leading-tight">TravellerPie</h1>
                    <p class="text-[10px] text-indigo-500 font-black uppercase tracking-[0.2em]">Don't Forget Your Pie While Travelling!</p>
                </div>
            </div>

            <div class="sidebar-card p-6">
                <label class="text-[10px] font-black uppercase text-slate-400 block mb-4">Trip Initializer</label>
                <textarea id="promptInput" rows="3" class="w-full bg-slate-50 rounded-2xl p-4 outline-none font-medium text-sm" placeholder="Plan trip from Bangalore..."></textarea>
                <button onclick="generateTrip()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl mt-4 shadow-xl hover:bg-indigo-700 transition-all">Run Multi-Agent Triage</button>
            </div>

            <div class="sidebar-card p-4 flex items-center justify-between border-l-4 border-indigo-500">
                <span id="userDisplay" class="text-[11px] font-black uppercase text-slate-700">Authenticated</span>
                <button onclick="logout()" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-power-off"></i></button>
            </div>

            <div class="sidebar-card p-6">
                <label class="text-[10px] font-black uppercase text-slate-400 mb-3 block">Context Engine</label>
                <div id="tagContainer" class="flex flex-wrap gap-2 mb-4"></div>
                <input id="tagInput" type="text" onkeypress="if(event.key==='Enter') addTag()" class="w-full bg-slate-50 rounded-xl p-3 text-sm outline-none" placeholder="Add preference...">
            </div>
            <div class="sidebar-card p-6 bg-slate-900 text-white border-none">
    <label class="text-[10px] font-black uppercase text-slate-500 mb-3 block tracking-widest">Plan Archive</label>
    <button onclick="fetchArchive()" class="w-full bg-white/10 hover:bg-white/20 text-[10px] font-bold py-2 rounded-lg transition-all mb-4">Refresh History</button>
    <div id="archiveList" class="space-y-3 max-h-48 overflow-y-auto pr-2">
        </div>
</div>
        </aside>

        <main class="lg:col-span-6">
            <div id="mainCard" class="main-card p-10 relative">
                <div id="tripContent" class="hidden space-y-8 animate-in fade-in duration-500">
                    <div id="flightSection" class="hidden space-y-3">
                        <div id="flightList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                    </div>
                    <div class="bg-indigo-50/50 p-8 rounded-3xl border border-indigo-100">
                        <p id="briefingText" class="text-slate-600 text-[14px] font-medium italic"></p>
                    </div>
                    <div id="dayTabs" class="flex gap-2 border-b border-slate-100 pb-4 overflow-x-auto"></div>
                    <div class="bg-indigo-900 rounded-[2.5rem] p-10 text-white shadow-2xl relative">
                        <h3 id="hotelNameText" class="text-2xl font-bold">...</h3>
                    </div>
                    <div id="itineraryDetail" class="space-y-8"></div>
                </div>
            </div>
        </main>

        <aside class="lg:col-span-3">
            <div class="log-box p-8">
                <div id="logContent" class="space-y-4"></div>
            </div>
        </aside>
    </div>

    <script>
       let archivedPlans = {}; // Global store to avoid string-parsing errors

async function fetchArchive() {
    const token = localStorage.getItem('token');
    const res = await fetch('/itineraries', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    const plans = await res.json();
    const container = document.getElementById('archiveList');
    
    if (!plans || plans.length === 0) {
        container.innerHTML = `<p class="text-[9px] text-slate-500 italic p-4">No plans found in Cloud SQL.</p>`;
        return;
    }

    // Store plans globally and render the list
    container.innerHTML = plans.map(p => {
        archivedPlans[p.id] = p.plan; // Store the JSON object
        return `
            <div onclick="loadPlan(${p.id})" class="p-3 bg-white/5 rounded-xl border border-white/10 cursor-pointer hover:border-indigo-500 transition-all group mb-2">
                <p class="text-[10px] font-black text-indigo-300 uppercase tracking-tighter">Trip to ${p.prompt.split('to')[1] || 'Destination'}</p>
                <p class="text-[8px] text-slate-500 mt-1 uppercase">${p.date}</p>
            </div>
        `;
    }).join('');
}

function loadPlan(id) {
    const data = archivedPlans[id];
    if (!data) return;

    // 1. Set the global tripData variable used by renderDay
    tripData = typeof data === 'string' ? JSON.parse(data) : data;
    
    // 2. Reveal the main UI
    document.getElementById('tripContent').classList.remove('hidden');
    
    // 3. Trigger your existing detailed render logic
    renderDay(1); 
    
    addTrace("System", "Full itinerary restored from Cloud SQL.", "text-green-400 font-bold");
}
        let userPreferences = [];
        let tripData = null;
        let isLoginMode = true;

        // --- CONTEXT ENGINE ---
        function addTag() {
    const input = document.getElementById('tagInput');
    const val = input.value.trim();
    if (val && !userPreferences.includes(val)) {
        userPreferences.push(val);
        renderTags();
        input.value = "";
        // Add this line for visual feedback in the log box
        addTrace("Context Engine", `Injected Persona: ${val}`, "text-indigo-400");
    }
}

        function removeTag(tag) {
            userPreferences = userPreferences.filter(t => t !== tag);
            renderTags();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            container.innerHTML = userPreferences.map(tag => `
                <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-bold flex items-center gap-2">
                    ${tag} <i class="fa-solid fa-xmark cursor-pointer" onclick="removeTag('${tag}')"></i>
                </span>
            `).join('');
        }

        // --- AUTH ---
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Access Portal" : "Identity Registry";
            document.getElementById('mainAuthBtn').innerText = isLoginMode ? "Login" : "Register";
        }

        async function submitAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            if(!email || !password) return alert("Credentials required.");

            try {
                let response;
                if(isLoginMode) {
                    const formData = new FormData();
                    formData.append('username', email);
                    formData.append('password', password);
                    formData.append('interests', JSON.stringify(userPreferences));
                    response = await fetch('/token', { method: 'POST', body: formData });
                } else {
                    response = await fetch('/register', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username: email, password: password, interests: userPreferences})
                    });
                }

                if (response.ok) {
                    if(isLoginMode) {
                        const data = await response.json();
                        localStorage.setItem('token', data.access_token);
                        document.getElementById('authOverlay').style.display = 'none';
                        document.getElementById('userDisplay').innerText = email.split('@')[0];
                    } else {
                        alert("Identity Registered. Now Login.");
                        toggleAuthMode();
                    }
                } else {
                    alert("Handshake Failed.");
                }
            } catch (err) { alert("Cloud SQL Error."); }
        }

        function logout() { localStorage.removeItem('token'); location.reload(); }

        function addTrace(agent, msg, color="text-indigo-400") {
            document.getElementById('logContent').innerHTML += `<div class="${color} font-mono text-[10px]">> [${agent}] ${msg}</div>`;
        }

        // --- GENERATION ---
        async function generateTrip() {
    const prompt = document.getElementById('promptInput').value;
    const token = localStorage.getItem('token');
    if(!prompt) return;
    
    document.getElementById('tripContent').classList.remove('hidden');
    document.getElementById('logContent').innerHTML = "";
    addTrace("Supervisor", "Injecting Identity Context...");

    try {
        const res = await fetch('/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json', 
                'Authorization': `Bearer ${token}`
            },
            // CRITICAL: Ensure 'preferences' is included here
            body: JSON.stringify({
                prompt: prompt, 
                preferences: userPreferences 
            })
        });
        
        tripData = await res.json();
        addTrace("Supervisor", "Context Synchronized.", "text-green-400 font-bold");
        renderDay(1);
    } catch (err) { 
        addTrace("Error", "Context Handshake Failure.", "text-red-400"); 
    }
}

        function renderDay(dayNum) {
    if (!tripData) return;

    // 1. FIX: Flight Display (Checking for 'logistics' key from orchestrator.py)
    const logistics = tripData.logistics || [];
    const flightSection = document.getElementById('flightSection');
    const flightList = document.getElementById('flightList');

    if (logistics.length > 0) {
        flightSection.classList.remove('hidden');
        flightList.innerHTML = logistics.slice(0, 3).map(f => `
            <div class="bg-slate-900 p-4 rounded-2xl text-white border border-slate-800">
                <span class="text-[8px] font-black bg-indigo-500 px-2 py-1 rounded uppercase">${f.airline}</span>
                <h2 class="text-sm font-black mt-2 uppercase">${f.route}</h2>
                <p class="text-xs font-bold text-indigo-300 mt-1">${f.price}</p>
                <a href="${f.link}" target="_blank" class="text-[9px] text-slate-400 underline mt-2 block">View Flight</a>
            </div>
        `).join('');
    } else {
        flightSection.classList.add('hidden');
    }

    // 2. FIX: Briefing Display
    document.getElementById('briefingText').innerText = tripData.morning_briefing || "No briefing available.";

    // 3. FIX: Day Tabs & Itinerary
    if (tripData.days && Array.isArray(tripData.days)) {
        document.getElementById('dayTabs').innerHTML = tripData.days.map(d => `
            <button onclick="renderDay(${d.day_number})" class="tab-btn ${d.day_number === dayNum ? 'tab-active' : 'bg-slate-50 text-slate-400'}">
                DAY 0${d.day_number}
            </button>
        `).join('');

        const day = tripData.days.find(d => d.day_number === dayNum) || tripData.days[0];
        document.getElementById('hotelNameText').innerText = day.hotel || "TBD";
        
        document.getElementById('itineraryDetail').innerHTML = ['morning', 'afternoon', 'evening'].map(t => `
            <div class="flex gap-6 mt-4 items-start">
                <div class="w-8 h-8 bg-indigo-50 rounded flex items-center justify-center text-indigo-500">
                    <i class="fa-solid fa-clock"></i>
                </div>
                <div>
                    <span class="text-[9px] font-black uppercase text-slate-400">${t}</span>
                    <p class="font-bold text-sm text-slate-700">${day[t] || "Relaxing time"}</p>
                </div>
            </div>
        `).join('');
    }
}
    </script>
</body>
</html>
